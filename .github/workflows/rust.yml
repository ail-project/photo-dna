name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Clippy Lint
      run: cargo clippy -- -D clippy::all
    - name: Cargo Doc
      run: RUSTDOCFLAGS="--deny warnings --cfg docsrs" cargo +nightly doc --all-features --open --no-deps --workspace
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --all-features --verbose
